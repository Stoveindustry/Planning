<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Planning salle de réunion</title>
  <style>
    :root {
      --bg: #edf1f5;
      --panel: #ffffff;
      --border: #d8dfe7;
      --text: #1f2733;
      --muted: #717c88;
      --blue: #4d89c6;
      --red: #d7262d;
      --red-dark: #b81f25;
      --green: #5f9460;
      --green-dark: #4f7f50;
      --busy: #dd2f36;
      --busy-soft: #fceaea;
      --selected: #fff4c7;
      --shadow: 0 12px 28px rgba(20, 30, 40, 0.08);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .module {
      width: min(1480px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .controls {
      max-width: 1100px;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .week-label {
      min-width: 320px;
      padding: 14px 18px;
      text-align: center;
      font-size: 21px;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #fff;
    }

    button {
      min-height: 52px;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-blue {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .btn-red:hover { background: var(--red-dark); }

    .btn-green {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .btn-green:hover { background: var(--green-dark); }

    .pill {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 15px;
    }

    .agenda {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #fff;
    }

    .agenda-scroll {
      overflow: auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      padding: 14px 10px;
      text-align: center;
      font-size: 15px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #f7f8fa;
    }

    thead th:first-child {
      width: 92px;
      min-width: 92px;
      background: #fff;
    }

    thead th.day-0 {
      background: #4d89c6;
      color: #fff;
    }

    thead th.day-1,
    thead th.day-2 {
      background: #f5f6f8;
    }

    thead th.day-3 {
      background: #e5eee6;
    }

    thead th.day-4 {
      background: #f3e4e4;
    }

    tbody th {
      width: 92px;
      min-width: 92px;
      padding: 10px 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 400;
      color: #2a3440;
      background: #fff;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      position: relative;
      width: 204px;
      min-width: 204px;
      height: 62px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #fff;
      vertical-align: top;
      transition: 0.15s ease;
    }

    tbody td.selected {
      box-shadow: inset 0 0 0 3px #d7b200;
      background: var(--selected);
    }

    tbody td.busy {
      background: var(--busy-soft);
    }

    .cell-editor {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      color: var(--text);
      line-height: 1.25;
    }

    .cell-editor::placeholder {
      color: #96a0ab;
    }

    td.busy .cell-editor {
      color: #8a1015;
      font-weight: 700;
    }

    .legend {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 980px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .module { padding: 18px 14px; }

      .week-label {
        min-width: 0;
        width: 100%;
      }

      .row { flex-direction: column; }

      button { width: 100%; }
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
      }

      .module {
        width: 100%;
        max-width: none;
        box-shadow: none;
        border-radius: 0;
        border: 0;
      }

      .controls { margin-bottom: 14px; }

      button { display: none; }

      .agenda-scroll { overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="module">
    <div class="controls">
      <div class="row">
        <button id="prevWeekBtn" class="btn-blue">← Semaine précédente</button>
        <div id="weekLabel" class="week-label"></div>
        <button id="nextWeekBtn">Semaine suivante →</button>
      </div>

      <div class="row">
        <button id="saveWeekBtn" class="btn-red">Enregistrer</button>
        <button id="reserveSlotBtn" class="btn-green">Réserver le créneau</button>
        <button id="clearSlotBtn">Vider le créneau</button>
        <button id="reserveDayBtn" class="btn-green">Réserver la journée</button>
        <button id="clearDayBtn">Vider la journée</button>
        <button id="printBtn" class="btn-red">Imprimer / PDF</button>
      </div>

      <div class="row">
        <div class="pill">Créneaux réservés : <strong id="busyCount">0</strong></div>
        <div class="pill">Créneaux libres : <strong id="freeCount">0</strong></div>
      </div>
    </div>

    <div id="status" class="status">Chargement du planning...</div>

    <div class="agenda">
      <div class="agenda-scroll">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="bodyRows"></tbody>
        </table>
      </div>
    </div>

    <div class="legend">
      Un premier clic sélectionne un créneau. Un second clic dans la même journée étend la sélection sur toute la plage horaire. Les modifications restent locales tant que vous n'avez pas cliqué sur “Enregistrer”.
    </div>
  </div>

  <form id="postForm" method="POST" target="hiddenFrame" style="display:none;">
    <input type="hidden" name="weekId" id="formWeekId">
    <input type="hidden" name="weekData" id="formWeekData">
  </form>

  <iframe name="hiddenFrame" style="display:none;"></iframe>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQSkYuWd1G7KlFINv1vZdsrjmBi0uZ1FiUztjR_MTJIGf9KYIXVhyeY0xUQHW5RBpDuQ/exec";

    const WEEKS = [{"id":"2026-04-20","label":"Semaine du 20/04/2026","days":[{"iso":"2026-04-20","label":"Lundi 20/04/2026"},{"iso":"2026-04-21","label":"Mardi 21/04/2026"},{"iso":"2026-04-22","label":"Mercredi 22/04/2026"},{"iso":"2026-04-23","label":"Jeudi 23/04/2026"},{"iso":"2026-04-24","label":"Vendredi 24/04/2026"}]},{"id":"2026-04-27","label":"Semaine du 27/04/2026","days":[{"iso":"2026-04-27","label":"Lundi 27/04/2026"},{"iso":"2026-04-28","label":"Mardi 28/04/2026"},{"iso":"2026-04-29","label":"Mercredi 29/04/2026"},{"iso":"2026-04-30","label":"Jeudi 30/04/2026"},{"iso":"2026-05-01","label":"Vendredi 01/05/2026"}]},{"id":"2026-05-04","label":"Semaine du 04/05/2026","days":[{"iso":"2026-05-04","label":"Lundi 04/05/2026"},{"iso":"2026-05-05","label":"Mardi 05/05/2026"},{"iso":"2026-05-06","label":"Mercredi 06/05/2026"},{"iso":"2026-05-07","label":"Jeudi 07/05/2026"},{"iso":"2026-05-08","label":"Vendredi 08/05/2026"}]},{"id":"2026-05-11","label":"Semaine du 11/05/2026","days":[{"iso":"2026-05-11","label":"Lundi 11/05/2026"},{"iso":"2026-05-12","label":"Mardi 12/05/2026"},{"iso":"2026-05-13","label":"Mercredi 13/05/2026"},{"iso":"2026-05-14","label":"Jeudi 14/05/2026"},{"iso":"2026-05-15","label":"Vendredi 15/05/2026"}]},{"id":"2026-05-18","label":"Semaine du 18/05/2026","days":[{"iso":"2026-05-18","label":"Lundi 18/05/2026"},{"iso":"2026-05-19","label":"Mardi 19/05/2026"},{"iso":"2026-05-20","label":"Mercredi 20/05/2026"},{"iso":"2026-05-21","label":"Jeudi 21/05/2026"},{"iso":"2026-05-22","label":"Vendredi 22/05/2026"}]},{"id":"2026-05-25","label":"Semaine du 25/05/2026","days":[{"iso":"2026-05-25","label":"Lundi 25/05/2026"},{"iso":"2026-05-26","label":"Mardi 26/05/2026"},{"iso":"2026-05-27","label":"Mercredi 27/05/2026"},{"iso":"2026-05-28","label":"Jeudi 28/05/2026"},{"iso":"2026-05-29","label":"Vendredi 29/05/2026"}]},{"id":"2026-06-01","label":"Semaine du 01/06/2026","days":[{"iso":"2026-06-01","label":"Lundi 01/06/2026"},{"iso":"2026-06-02","label":"Mardi 02/06/2026"},{"iso":"2026-06-03","label":"Mercredi 03/06/2026"},{"iso":"2026-06-04","label":"Jeudi 04/06/2026"},{"iso":"2026-06-05","label":"Vendredi 05/06/2026"}]},{"id":"2026-06-08","label":"Semaine du 08/06/2026","days":[{"iso":"2026-06-08","label":"Lundi 08/06/2026"},{"iso":"2026-06-09","label":"Mardi 09/06/2026"},{"iso":"2026-06-10","label":"Mercredi 10/06/2026"},{"iso":"2026-06-11","label":"Jeudi 11/06/2026"},{"iso":"2026-06-12","label":"Vendredi 12/06/2026"}]},{"id":"2026-06-15","label":"Semaine du 15/06/2026","days":[{"iso":"2026-06-15","label":"Lundi 15/06/2026"},{"iso":"2026-06-16","label":"Mardi 16/06/2026"},{"iso":"2026-06-17","label":"Mercredi 17/06/2026"},{"iso":"2026-06-18","label":"Jeudi 18/06/2026"},{"iso":"2026-06-19","label":"Vendredi 19/06/2026"}]},{"id":"2026-06-22","label":"Semaine du 22/06/2026","days":[{"iso":"2026-06-22","label":"Lundi 22/06/2026"},{"iso":"2026-06-23","label":"Mardi 23/06/2026"},{"iso":"2026-06-24","label":"Mercredi 24/06/2026"},{"iso":"2026-06-25","label":"Jeudi 25/06/2026"},{"iso":"2026-06-26","label":"Vendredi 26/06/2026"}]},{"id":"2026-06-29","label":"Semaine du 29/06/2026","days":[{"iso":"2026-06-29","label":"Lundi 29/06/2026"},{"iso":"2026-06-30","label":"Mardi 30/06/2026"},{"iso":"2026-07-01","label":"Mercredi 01/07/2026"},{"iso":"2026-07-02","label":"Jeudi 02/07/2026"},{"iso":"2026-07-03","label":"Vendredi 03/07/2026"}]},{"id":"2026-07-06","label":"Semaine du 06/07/2026","days":[{"iso":"2026-07-06","label":"Lundi 06/07/2026"},{"iso":"2026-07-07","label":"Mardi 07/07/2026"},{"iso":"2026-07-08","label":"Mercredi 08/07/2026"},{"iso":"2026-07-09","label":"Jeudi 09/07/2026"},{"iso":"2026-07-10","label":"Vendredi 10/07/2026"}]},{"id":"2026-07-13","label":"Semaine du 13/07/2026","days":[{"iso":"2026-07-13","label":"Lundi 13/07/2026"},{"iso":"2026-07-14","label":"Mardi 14/07/2026"},{"iso":"2026-07-15","label":"Mercredi 15/07/2026"},{"iso":"2026-07-16","label":"Jeudi 16/07/2026"},{"iso":"2026-07-17","label":"Vendredi 17/07/2026"}]},{"id":"2026-07-20","label":"Semaine du 20/07/2026","days":[{"iso":"2026-07-20","label":"Lundi 20/07/2026"},{"iso":"2026-07-21","label":"Mardi 21/07/2026"},{"iso":"2026-07-22","label":"Mercredi 22/07/2026"},{"iso":"2026-07-23","label":"Jeudi 23/07/2026"},{"iso":"2026-07-24","label":"Vendredi 24/07/2026"}]},{"id":"2026-07-27","label":"Semaine du 27/07/2026","days":[{"iso":"2026-07-27","label":"Lundi 27/07/2026"},{"iso":"2026-07-28","label":"Mardi 28/07/2026"},{"iso":"2026-07-29","label":"Mercredi 29/07/2026"},{"iso":"2026-07-30","label":"Jeudi 30/07/2026"},{"iso":"2026-07-31","label":"Vendredi 31/07/2026"}]},{"id":"2026-08-03","label":"Semaine du 03/08/2026","days":[{"iso":"2026-08-03","label":"Lundi 03/08/2026"},{"iso":"2026-08-04","label":"Mardi 04/08/2026"},{"iso":"2026-08-05","label":"Mercredi 05/08/2026"},{"iso":"2026-08-06","label":"Jeudi 06/08/2026"},{"iso":"2026-08-07","label":"Vendredi 07/08/2026"}]},{"id":"2026-08-10","label":"Semaine du 10/08/2026","days":[{"iso":"2026-08-10","label":"Lundi 10/08/2026"},{"iso":"2026-08-11","label":"Mardi 11/08/2026"},{"iso":"2026-08-12","label":"Mercredi 12/08/2026"},{"iso":"2026-08-13","label":"Jeudi 13/08/2026"},{"iso":"2026-08-14","label":"Vendredi 14/08/2026"}]},{"id":"2026-08-17","label":"Semaine du 17/08/2026","days":[{"iso":"2026-08-17","label":"Lundi 17/08/2026"},{"iso":"2026-08-18","label":"Mardi 18/08/2026"},{"iso":"2026-08-19","label":"Mercredi 19/08/2026"},{"iso":"2026-08-20","label":"Jeudi 20/08/2026"},{"iso":"2026-08-21","label":"Vendredi 21/08/2026"}]},{"id":"2026-08-24","label":"Semaine du 24/08/2026","days":[{"iso":"2026-08-24","label":"Lundi 24/08/2026"},{"iso":"2026-08-25","label":"Mardi 25/08/2026"},{"iso":"2026-08-26","label":"Mercredi 26/08/2026"},{"iso":"2026-08-27","label":"Jeudi 27/08/2026"},{"iso":"2026-08-28","label":"Vendredi 28/08/2026"}]},{"id":"2026-08-31","label":"Semaine du 31/08/2026","days":[{"iso":"2026-08-31","label":"Lundi 31/08/2026"},{"iso":"2026-09-01","label":"Mardi 01/09/2026"},{"iso":"2026-09-02","label":"Mercredi 02/09/2026"},{"iso":"2026-09-03","label":"Jeudi 03/09/2026"},{"iso":"2026-09-04","label":"Vendredi 04/09/2026"}]}];

    const SLOTS = [
      "09:00", "09:30",
      "10:00", "10:30",
      "11:00", "11:30",
      "12:00", "12:30",
      "13:00", "13:30",
      "14:00", "14:30",
      "15:00", "15:30",
      "16:00", "16:30",
      "17:00", "17:30"
    ];

    let state = {};
    let currentWeekIndex = 0;
    let selectedCells = [];
    let selectionAnchor = null;
    let isSubmitting = false;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function makeKey(dayIso, time) {
      return `${dayIso}__${time}`;
    }

    function readCell(dayIso, time) {
      const key = makeKey(dayIso, time);
      return state[key] || { text: "", reserved: false };
    }

    function buildJsonpUrl(params) {
      const callbackName = "__planningCb_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      const url = new URL(APPS_SCRIPT_URL);
      Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
      url.searchParams.set("callback", callbackName);
      return { url: url.toString(), callbackName };
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        const { url, callbackName } = buildJsonpUrl(params);
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("Délai dépassé lors de l'appel Google Apps Script."));
        }, 20000);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Erreur de chargement du script Google Apps Script."));
        };

        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function loadData() {
      try {
        setStatus("Chargement des données...");
        const response = await jsonpRequest({ action: "read" });

        if (!response || !response.ok) {
          throw new Error(response && response.error ? response.error : "Lecture impossible.");
        }

        state = {};
        const rows = response.rows || [];

        if (Array.isArray(rows) && rows.length > 1) {
          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[0]) continue;
            state[row[0]] = {
              text: row[3] || "",
              reserved: String(row[4]) === "true"
            };
          }
        }

        render();
        setStatus("Planning chargé.");
      } catch (error) {
        console.error(error);
        setStatus("Erreur de chargement.");
      }
    }

    function buildCurrentWeekData() {
      const week = WEEKS[currentWeekIndex];
      const weekData = [];

      for (const day of week.days) {
        for (const time of SLOTS) {
          const key = makeKey(day.iso, time);
          const value = state[key] || { text: "", reserved: false };

          if ((value.text || "").trim() || value.reserved) {
            weekData.push({
              key,
              day: day.iso,
              time,
              text: value.text || "",
              reserved: !!value.reserved
            });
          }
        }
      }

      return { week, weekData };
    }

    function saveCurrentWeek() {
      if (isSubmitting) return;

      const { week, weekData } = buildCurrentWeekData();
      const form = document.getElementById("postForm");
      const hiddenFrame = document.querySelector('iframe[name="hiddenFrame"]');

      isSubmitting = true;
      setStatus("Enregistrement en cours...");

      document.getElementById("formWeekId").value = week.id;
      document.getElementById("formWeekData").value = JSON.stringify(weekData);
      form.action = APPS_SCRIPT_URL;

      const finishSuccess = () => {
        if (!isSubmitting) return;
        isSubmitting = false;
        setStatus("Semaine enregistrée.");
        hiddenFrame.removeEventListener("load", finishSuccess);
      };

      hiddenFrame.addEventListener("load", finishSuccess, { once: true });

      form.submit();

      setTimeout(() => {
        if (isSubmitting) {
          isSubmitting = false;
          setStatus("Semaine enregistrée.");
        }
      }, 1500);
    }

    function initWeekIndex() {
      const todayIso = new Date().toISOString().slice(0, 10);
      const foundIndex = WEEKS.findIndex(week => week.days.some(day => day.iso === todayIso));
      currentWeekIndex = foundIndex >= 0 ? foundIndex : 0;
    }

    function updateStats() {
      const week = WEEKS[currentWeekIndex];
      let busy = 0;

      week.days.forEach(day => {
        SLOTS.forEach(time => {
          const cell = readCell(day.iso, time);
          if (cell.reserved) busy += 1;
        });
      });

      const total = week.days.length * SLOTS.length;
      document.getElementById("busyCount").textContent = busy;
      document.getElementById("freeCount").textContent = total - busy;
    }

    function clearSelection() {
      selectedCells.forEach(cell => cell.td.classList.remove("selected"));
      selectedCells = [];
      selectionAnchor = null;
    }

    function getSlotIndex(time) {
      return SLOTS.indexOf(time);
    }

    function selectSingleCell(td, dayIso, time) {
      clearSelection();
      td.classList.add("selected");
      selectedCells = [{ td, dayIso, time }];
      selectionAnchor = { dayIso, time };
    }

    function selectRange(dayIso, startTime, endTime) {
      clearSelection();

      const startIndex = getSlotIndex(startTime);
      const endIndex = getSlotIndex(endTime);

      if (startIndex === -1 || endIndex === -1) return;

      const minIndex = Math.min(startIndex, endIndex);
      const maxIndex = Math.max(startIndex, endIndex);

      for (let i = minIndex; i <= maxIndex; i++) {
        const time = SLOTS[i];
        const td = document.querySelector(`td[data-day="${dayIso}"][data-time="${time}"]`);
        if (td) {
          td.classList.add("selected");
          selectedCells.push({ td, dayIso, time });
        }
      }

      selectionAnchor = { dayIso, time: startTime };
    }

    function handleCellSelection(td, dayIso, time) {
      if (!selectionAnchor) {
        selectSingleCell(td, dayIso, time);
        return;
      }

      if (selectionAnchor.dayIso !== dayIso) {
        selectSingleCell(td, dayIso, time);
        return;
      }

      selectRange(dayIso, selectionAnchor.time, time);
    }

    function applyCellStyle(td, cellData) {
      td.classList.toggle("busy", !!cellData.reserved);
    }

    function writeCellLocally(dayIso, time, value) {
      const key = makeKey(dayIso, time);
      const safeText = (value.text || "").trim();
      const reserved = !!value.reserved;

      if (!safeText && !reserved) {
        delete state[key];
      } else {
        state[key] = { text: safeText, reserved };
      }

      updateStats();
    }

    function getSelectedDayIso() {
      if (!selectedCells.length) return null;
      return selectedCells[0].dayIso;
    }

    function reserveSelectedRange() {
      if (!selectedCells.length) return;

      const firstKey = makeKey(selectedCells[0].dayIso, selectedCells[0].time);
      const firstText = state[firstKey]?.text || "";

      selectedCells.forEach(cell => {
        const current = readCell(cell.dayIso, cell.time);
        writeCellLocally(cell.dayIso, cell.time, {
          text: current.text || firstText,
          reserved: true
        });
      });

      render();
      setStatus("Sélection réservée localement. Pensez à cliquer sur Enregistrer.");
    }

    function clearSelectedRange() {
      if (!selectedCells.length) return;

      selectedCells.forEach(cell => {
        writeCellLocally(cell.dayIso, cell.time, {
          text: "",
          reserved: false
        });
      });

      render();
      setStatus("Sélection vidée localement. Pensez à cliquer sur Enregistrer.");
    }

    function reserveWholeDay() {
      const dayIso = getSelectedDayIso();
      if (!dayIso) return;

      let sharedText = "";
      for (const time of SLOTS) {
        const current = readCell(dayIso, time);
        if ((current.text || "").trim()) {
          sharedText = current.text;
          break;
        }
      }

      SLOTS.forEach(time => {
        const current = readCell(dayIso, time);
        writeCellLocally(dayIso, time, {
          text: current.text || sharedText,
          reserved: true
        });
      });

      render();
      setStatus("Journée réservée localement. Pensez à cliquer sur Enregistrer.");
    }

    function clearWholeDay() {
      const dayIso = getSelectedDayIso();
      if (!dayIso) return;

      SLOTS.forEach(time => {
        writeCellLocally(dayIso, time, {
          text: "",
          reserved: false
        });
      });

      render();
      setStatus("Journée vidée localement. Pensez à cliquer sur Enregistrer.");
    }

    function render() {
      clearSelection();

      const week = WEEKS[currentWeekIndex];
      document.getElementById("weekLabel").textContent = week.label;

      const headerRow = document.getElementById("headerRow");
      headerRow.innerHTML = "";

      const firstHeader = document.createElement("th");
      firstHeader.textContent = "";
      headerRow.appendChild(firstHeader);

      week.days.forEach((day, index) => {
        const th = document.createElement("th");
        th.className = `day-${index}`;
        th.textContent = day.label;
        headerRow.appendChild(th);
      });

      const bodyRows = document.getElementById("bodyRows");
      bodyRows.innerHTML = "";

      SLOTS.forEach(time => {
        const tr = document.createElement("tr");

        const timeCell = document.createElement("th");
        timeCell.textContent = time;
        tr.appendChild(timeCell);

        week.days.forEach(day => {
          const td = document.createElement("td");
          const cellData = readCell(day.iso, time);

          td.dataset.day = day.iso;
          td.dataset.time = time;

          const textarea = document.createElement("textarea");
          textarea.className = "cell-editor";
          textarea.placeholder = "Nom / réunion";
          textarea.value = cellData.text;

          applyCellStyle(td, cellData);

          td.addEventListener("click", () => {
            handleCellSelection(td, day.iso, time);
          });

          textarea.addEventListener("click", (event) => {
            event.stopPropagation();
            handleCellSelection(td, day.iso, time);
          });

          textarea.addEventListener("input", () => {
            const currentData = readCell(day.iso, time);
            writeCellLocally(day.iso, time, {
              text: textarea.value,
              reserved: currentData.reserved
            });
            setStatus("Modification locale en attente d'enregistrement.");
          });

          td.appendChild(textarea);
          tr.appendChild(td);
        });

        bodyRows.appendChild(tr);
      });

      document.getElementById("prevWeekBtn").disabled = currentWeekIndex === 0;
      document.getElementById("nextWeekBtn").disabled = currentWeekIndex === WEEKS.length - 1;

      updateStats();
    }

    document.getElementById("reserveSlotBtn").addEventListener("click", () => {
      reserveSelectedRange();
    });

    document.getElementById("clearSlotBtn").addEventListener("click", () => {
      clearSelectedRange();
    });

    document.getElementById("reserveDayBtn").addEventListener("click", () => {
      reserveWholeDay();
    });

    document.getElementById("clearDayBtn").addEventListener("click", () => {
      clearWholeDay();
    });

    document.getElementById("saveWeekBtn").addEventListener("click", () => {
      saveCurrentWeek();
    });

    document.getElementById("prevWeekBtn").addEventListener("click", () => {
      if (currentWeekIndex > 0) {
        currentWeekIndex -= 1;
        render();
        setStatus("Semaine changée.");
      }
    });

    document.getElementById("nextWeekBtn").addEventListener("click", () => {
      if (currentWeekIndex < WEEKS.length - 1) {
        currentWeekIndex += 1;
        render();
        setStatus("Semaine changée.");
      }
    });

    document.getElementById("printBtn").addEventListener("click", () => {
      window.print();
    });

    initWeekIndex();
    loadData();
  </script>
</body>
</html>
