<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Planning salle de réunion</title>
  <style>
    :root {
      --bg: #edf1f5;
      --panel: #ffffff;
      --border: #d8dfe7;
      --text: #1f2733;
      --muted: #717c88;
      --blue: #4d89c6;
      --red: #d7262d;
      --red-dark: #b81f25;
      --green: #5f9460;
      --green-dark: #4f7f50;
      --busy: #dd2f36;
      --busy-soft: #fceaea;
      --selected: #fff4c7;
      --shadow: 0 12px 28px rgba(20, 30, 40, 0.08);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .module {
      width: min(1400px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .controls {
      max-width: 940px;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .week-label {
      min-width: 320px;
      padding: 14px 18px;
      text-align: center;
      font-size: 21px;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #fff;
    }

    button {
      min-height: 52px;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-blue {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .btn-red:hover { background: var(--red-dark); }

    .btn-green {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .btn-green:hover { background: var(--green-dark); }

    .pill {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 15px;
    }

    .agenda {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #fff;
    }

    .agenda-scroll {
      overflow: auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      padding: 16px 12px;
      text-align: center;
      font-size: 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #f7f8fa;
    }

    thead th:first-child {
      width: 92px;
      min-width: 92px;
      background: #fff;
    }

    thead th.day-0 {
      background: #4d89c6;
      color: #fff;
    }

    thead th.day-1,
    thead th.day-2 {
      background: #f5f6f8;
    }

    thead th.day-3 {
      background: #e5eee6;
    }

    thead th.day-4 {
      background: #f3e4e4;
    }

    tbody th {
      width: 92px;
      min-width: 92px;
      padding: 16px 10px;
      text-align: center;
      font-size: 18px;
      font-weight: 400;
      color: #2a3440;
      background: #fff;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      position: relative;
      width: 204px;
      min-width: 204px;
      height: 82px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #fff;
      vertical-align: top;
      transition: 0.15s ease;
    }

    tbody td.selected {
      box-shadow: inset 0 0 0 3px #d7b200;
      background: var(--selected);
    }

    tbody td.busy {
      background: var(--busy-soft);
    }

    .cell-editor {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: var(--text);
      line-height: 1.35;
    }

    .cell-editor::placeholder { color: #96a0ab; }

    td.busy .cell-editor {
      color: #8a1015;
      font-weight: 700;
    }

    .legend {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 980px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .module { padding: 18px 14px; }

      .week-label {
        min-width: 0;
        width: 100%;
      }

      .row { flex-direction: column; }

      button { width: 100%; }
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
      }

      .module {
        width: 100%;
        max-width: none;
        box-shadow: none;
        border-radius: 0;
        border: 0;
      }

      .controls { margin-bottom: 14px; }

      button { display: none; }

      .agenda-scroll { overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="module">
    <div class="controls">
      <div class="row">
        <button id="prevWeekBtn" class="btn-blue">← Semaine précédente</button>
        <div id="weekLabel" class="week-label"></div>
        <button id="nextWeekBtn">Semaine suivante →</button>
      </div>

      <div class="row">
        <button id="clearWeekBtn" class="btn-red">Vider la semaine</button>
        <button id="reserveSlotBtn" class="btn-green">Réserver le créneau</button>
        <button id="clearSlotBtn">Vider le créneau</button>
        <button id="printBtn" class="btn-red">Imprimer / PDF</button>
      </div>

      <div class="row">
        <div class="pill">Créneaux réservés : <strong id="busyCount">0</strong></div>
        <div class="pill">Créneaux libres : <strong id="freeCount">0</strong></div>
      </div>
    </div>

    <div id="status" class="status">Chargement du planning...</div>

    <div class="agenda">
      <div class="agenda-scroll">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="bodyRows"></tbody>
        </table>
      </div>
    </div>

    <div class="legend">
      Cliquez sur une case pour la sélectionner. Vous pouvez écrire directement dans chaque créneau, puis utiliser “Réserver le créneau” pour le marquer en rouge.
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQSkYuWd1G7KlFINv1vZdsrjmBi0uZ1FiUztjR_MTJIGf9KYIXVhyeY0xUQHW5RBpDuQ/exec";

    const WEEKS = [{"id":"2026-04-20","label":"Semaine du 20/04/2026","days":[{"iso":"2026-04-20","label":"Lundi 20/04/2026"},{"iso":"2026-04-21","label":"Mardi 21/04/2026"},{"iso":"2026-04-22","label":"Mercredi 22/04/2026"},{"iso":"2026-04-23","label":"Jeudi 23/04/2026"},{"iso":"2026-04-24","label":"Vendredi 24/04/2026"}]},{"id":"2026-04-27","label":"Semaine du 27/04/2026","days":[{"iso":"2026-04-27","label":"Lundi 27/04/2026"},{"iso":"2026-04-28","label":"Mardi 28/04/2026"},{"iso":"2026-04-29","label":"Mercredi 29/04/2026"},{"iso":"2026-04-30","label":"Jeudi 30/04/2026"},{"iso":"2026-05-01","label":"Vendredi 01/05/2026"}]},{"id":"2026-05-04","label":"Semaine du 04/05/2026","days":[{"iso":"2026-05-04","label":"Lundi 04/05/2026"},{"iso":"2026-05-05","label":"Mardi 05/05/2026"},{"iso":"2026-05-06","label":"Mercredi 06/05/2026"},{"iso":"2026-05-07","label":"Jeudi 07/05/2026"},{"iso":"2026-05-08","label":"Vendredi 08/05/2026"}]},{"id":"2026-05-11","label":"Semaine du 11/05/2026","days":[{"iso":"2026-05-11","label":"Lundi 11/05/2026"},{"iso":"2026-05-12","label":"Mardi 12/05/2026"},{"iso":"2026-05-13","label":"Mercredi 13/05/2026"},{"iso":"2026-05-14","label":"Jeudi 14/05/2026"},{"iso":"2026-05-15","label":"Vendredi 15/05/2026"}]},{"id":"2026-05-18","label":"Semaine du 18/05/2026","days":[{"iso":"2026-05-18","label":"Lundi 18/05/2026"},{"iso":"2026-05-19","label":"Mardi 19/05/2026"},{"iso":"2026-05-20","label":"Mercredi 20/05/2026"},{"iso":"2026-05-21","label":"Jeudi 21/05/2026"},{"iso":"2026-05-22","label":"Vendredi 22/05/2026"}]},{"id":"2026-05-25","label":"Semaine du 25/05/2026","days":[{"iso":"2026-05-25","label":"Lundi 25/05/2026"},{"iso":"2026-05-26","label":"Mardi 26/05/2026"},{"iso":"2026-05-27","label":"Mercredi 27/05/2026"},{"iso":"2026-05-28","label":"Jeudi 28/05/2026"},{"iso":"2026-05-29","label":"Vendredi 29/05/2026"}]},{"id":"2026-06-01","label":"Semaine du 01/06/2026","days":[{"iso":"2026-06-01","label":"Lundi 01/06/2026"},{"iso":"2026-06-02","label":"Mardi 02/06/2026"},{"iso":"2026-06-03","label":"Mercredi 03/06/2026"},{"iso":"2026-06-04","label":"Jeudi 04/06/2026"},{"iso":"2026-06-05","label":"Vendredi 05/06/2026"}]},{"id":"2026-06-08","label":"Semaine du 08/06/2026","days":[{"iso":"2026-06-08","label":"Lundi 08/06/2026"},{"iso":"2026-06-09","label":"Mardi 09/06/2026"},{"iso":"2026-06-10","label":"Mercredi 10/06/2026"},{"iso":"2026-06-11","label":"Jeudi 11/06/2026"},{"iso":"2026-06-12","label":"Vendredi 12/06/2026"}]},{"id":"2026-06-15","label":"Semaine du 15/06/2026","days":[{"iso":"2026-06-15","label":"Lundi 15/06/2026"},{"iso":"2026-06-16","label":"Mardi 16/06/2026"},{"iso":"2026-06-17","label":"Mercredi 17/06/2026"},{"iso":"2026-06-18","label":"Jeudi 18/06/2026"},{"iso":"2026-06-19","label":"Vendredi 19/06/2026"}]},{"id":"2026-06-22","label":"Semaine du 22/06/2026","days":[{"iso":"2026-06-22","label":"Lundi 22/06/2026"},{"iso":"2026-06-23","label":"Mardi 23/06/2026"},{"iso":"2026-06-24","label":"Mercredi 24/06/2026"},{"iso":"2026-06-25","label":"Jeudi 25/06/2026"},{"iso":"2026-06-26","label":"Vendredi 26/06/2026"}]},{"id":"2026-06-29","label":"Semaine du 29/06/2026","days":[{"iso":"2026-06-29","label":"Lundi 29/06/2026"},{"iso":"2026-06-30","label":"Mardi 30/06/2026"},{"iso":"2026-07-01","label":"Mercredi 01/07/2026"},{"iso":"2026-07-02","label":"Jeudi 02/07/2026"},{"iso":"2026-07-03","label":"Vendredi 03/07/2026"}]},{"id":"2026-07-06","label":"Semaine du 06/07/2026","days":[{"iso":"2026-07-06","label":"Lundi 06/07/2026"},{"iso":"2026-07-07","label":"Mardi 07/07/2026"},{"iso":"2026-07-08","label":"Mercredi 08/07/2026"},{"iso":"2026-07-09","label":"Jeudi 09/07/2026"},{"iso":"2026-07-10","label":"Vendredi 10/07/2026"}]},{"id":"2026-07-13","label":"Semaine du 13/07/2026","days":[{"iso":"2026-07-13","label":"Lundi 13/07/2026"},{"iso":"2026-07-14","label":"Mardi 14/07/2026"},{"iso":"2026-07-15","label":"Mercredi 15/07/2026"},{"iso":"2026-07-16","label":"Jeudi 16/07/2026"},{"iso":"2026-07-17","label":"Vendredi 17/07/2026"}]},{"id":"2026-07-20","label":"Semaine du 20/07/2026","days":[{"iso":"2026-07-20","label":"Lundi 20/07/2026"},{"iso":"2026-07-21","label":"Mardi 21/07/2026"},{"iso":"2026-07-22","label":"Mercredi 22/07/2026"},{"iso":"2026-07-23","label":"Jeudi 23/07/2026"},{"iso":"2026-07-24","label":"Vendredi 24/07/2026"}]},{"id":"2026-07-27","label":"Semaine du 27/07/2026","days":[{"iso":"2026-07-27","label":"Lundi 27/07/2026"},{"iso":"2026-07-28","label":"Mardi 28/07/2026"},{"iso":"2026-07-29","label":"Mercredi 29/07/2026"},{"iso":"2026-07-30","label":"Jeudi 30/07/2026"},{"iso":"2026-07-31","label":"Vendredi 31/07/2026"}]},{"id":"2026-08-03","label":"Semaine du 03/08/2026","days":[{"iso":"2026-08-03","label":"Lundi 03/08/2026"},{"iso":"2026-08-04","label":"Mardi 04/08/2026"},{"iso":"2026-08-05","label":"Mercredi 05/08/2026"},{"iso":"2026-08-06","label":"Jeudi 06/08/2026"},{"iso":"2026-08-07","label":"Vendredi 07/08/2026"}]},{"id":"2026-08-10","label":"Semaine du 10/08/2026","days":[{"iso":"2026-08-10","label":"Lundi 10/08/2026"},{"iso":"2026-08-11","label":"Mardi 11/08/2026"},{"iso":"2026-08-12","label":"Mercredi 12/08/2026"},{"iso":"2026-08-13","label":"Jeudi 13/08/2026"},{"iso":"2026-08-14","label":"Vendredi 14/08/2026"}]},{"id":"2026-08-17","label":"Semaine du 17/08/2026","days":[{"iso":"2026-08-17","label":"Lundi 17/08/2026"},{"iso":"2026-08-18","label":"Mardi 18/08/2026"},{"iso":"2026-08-19","label":"Mercredi 19/08/2026"},{"iso":"2026-08-20","label":"Jeudi 20/08/2026"},{"iso":"2026-08-21","label":"Vendredi 21/08/2026"}]},{"id":"2026-08-24","label":"Semaine du 24/08/2026","days":[{"iso":"2026-08-24","label":"Lundi 24/08/2026"},{"iso":"2026-08-25","label":"Mardi 25/08/2026"},{"iso":"2026-08-26","label":"Mercredi 26/08/2026"},{"iso":"2026-08-27","label":"Jeudi 27/08/2026"},{"iso":"2026-08-28","label":"Vendredi 28/08/2026"}]},{"id":"2026-08-31","label":"Semaine du 31/08/2026","days":[{"iso":"2026-08-31","label":"Lundi 31/08/2026"},{"iso":"2026-09-01","label":"Mardi 01/09/2026"},{"iso":"2026-09-02","label":"Mercredi 02/09/2026"},{"iso":"2026-09-03","label":"Jeudi 03/09/2026"},{"iso":"2026-09-04","label":"Vendredi 04/09/2026"}]}];
    const SLOTS = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

    let state = {};
    let currentWeekIndex = 0;
    let selectedKey = null;
    let selectedCell = null;
    let saveTimeout = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function makeKey(dayIso, time) {
      return `${dayIso}__${time}`;
    }

    function readCell(dayIso, time) {
      const key = makeKey(dayIso, time);
      return state[key] || { text: "", reserved: false };
    }

    async function loadData() {
      setStatus("Chargement des données...");
      const response = await fetch(APPS_SCRIPT_URL);
      const rows = await response.json();

      state = {};
      if (Array.isArray(rows) && rows.length > 1) {
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[0]) continue;
          state[row[0]] = {
            text: row[3] || "",
            reserved: String(row[4]) === "true"
          };
        }
      }

      setStatus("Planning synchronisé.");
      render();
    }

    async function saveAllData() {
      const rows = [["key", "day", "time", "text", "reserved"]];
      Object.keys(state).forEach((key) => {
        const [day, time] = key.split("__");
        rows.push([key, day, time, state[key].text || "", state[key].reserved ? "true" : "false"]);
      });

      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(rows),
        headers: { "Content-Type": "application/json" }
      });
    }

    function queueSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        try {
          setStatus("Enregistrement...");
          await saveAllData();
          setStatus("Enregistré.");
        } catch (error) {
          setStatus("Erreur d'enregistrement.");
          console.error(error);
        }
      }, 500);
    }

    function writeCell(dayIso, time, value) {
      const key = makeKey(dayIso, time);
      const safeText = (value.text || "").trim();
      const reserved = !!value.reserved;

      if (!safeText && !reserved) {
        delete state[key];
      } else {
        state[key] = { text: safeText, reserved };
      }

      updateStats();
      queueSave();
    }

    function initWeekIndex() {
      const todayIso = new Date().toISOString().slice(0, 10);
      const foundIndex = WEEKS.findIndex(week => week.days.some(day => day.iso === todayIso));
      currentWeekIndex = foundIndex >= 0 ? foundIndex : 0;
    }

    function updateStats() {
      const week = WEEKS[currentWeekIndex];
      let busy = 0;

      week.days.forEach(day => {
        SLOTS.forEach(time => {
          const cell = readCell(day.iso, time);
          if (cell.reserved) busy += 1;
        });
      });

      const total = week.days.length * SLOTS.length;
      document.getElementById("busyCount").textContent = busy;
      document.getElementById("freeCount").textContent = total - busy;
    }

    function clearSelection() {
      if (selectedCell) selectedCell.classList.remove("selected");
      selectedCell = null;
      selectedKey = null;
    }

    function selectCell(td, dayIso, time) {
      if (selectedCell) selectedCell.classList.remove("selected");
      selectedCell = td;
      selectedKey = makeKey(dayIso, time);
      td.classList.add("selected");
    }

    function applyCellStyle(td, cellData) {
      td.classList.toggle("busy", !!cellData.reserved);
    }

    function render() {
      clearSelection();

      const week = WEEKS[currentWeekIndex];
      document.getElementById("weekLabel").textContent = week.label;

      const headerRow = document.getElementById("headerRow");
      headerRow.innerHTML = "";

      const firstHeader = document.createElement("th");
      firstHeader.textContent = "";
      headerRow.appendChild(firstHeader);

      week.days.forEach((day, index) => {
        const th = document.createElement("th");
        th.className = `day-${index}`;
        th.textContent = day.label;
        headerRow.appendChild(th);
      });

      const bodyRows = document.getElementById("bodyRows");
      bodyRows.innerHTML = "";

      SLOTS.forEach(time => {
        const tr = document.createElement("tr");

        const timeCell = document.createElement("th");
        timeCell.textContent = time;
        tr.appendChild(timeCell);

        week.days.forEach(day => {
          const td = document.createElement("td");
          const cellData = readCell(day.iso, time);

          const textarea = document.createElement("textarea");
          textarea.className = "cell-editor";
          textarea.placeholder = "Nom / réunion";
          textarea.value = cellData.text;

          applyCellStyle(td, cellData);

          td.addEventListener("click", () => {
            selectCell(td, day.iso, time);
          });

          textarea.addEventListener("click", (event) => {
            event.stopPropagation();
            selectCell(td, day.iso, time);
          });

          textarea.addEventListener("input", () => {
            const currentData = readCell(day.iso, time);
            writeCell(day.iso, time, {
              text: textarea.value,
              reserved: currentData.reserved
            });
          });

          td.appendChild(textarea);
          tr.appendChild(td);
        });

        bodyRows.appendChild(tr);
      });

      document.getElementById("prevWeekBtn").disabled = currentWeekIndex === 0;
      document.getElementById("nextWeekBtn").disabled = currentWeekIndex === WEEKS.length - 1;

      updateStats();
    }

    document.getElementById("reserveSlotBtn").addEventListener("click", () => {
      if (!selectedKey || !selectedCell) return;

      const [dayIso, time] = selectedKey.split("__");
      const cellData = readCell(dayIso, time);

      writeCell(dayIso, time, {
        text: cellData.text,
        reserved: true
      });

      selectedCell.classList.add("busy");
    });

    document.getElementById("clearSlotBtn").addEventListener("click", () => {
      if (!selectedKey || !selectedCell) return;

      const [dayIso, time] = selectedKey.split("__");

      writeCell(dayIso, time, {
        text: "",
        reserved: false
      });

      const textarea = selectedCell.querySelector(".cell-editor");
      if (textarea) textarea.value = "";
      selectedCell.classList.remove("busy");
    });

    document.getElementById("clearWeekBtn").addEventListener("click", () => {
      const week = WEEKS[currentWeekIndex];

      week.days.forEach(day => {
        SLOTS.forEach(time => {
          delete state[makeKey(day.iso, time)];
        });
      });

      updateStats();
      render();
      queueSave();
    });

    document.getElementById("prevWeekBtn").addEventListener("click", () => {
      if (currentWeekIndex > 0) {
        currentWeekIndex -= 1;
        render();
      }
    });

    document.getElementById("nextWeekBtn").addEventListener("click", () => {
      if (currentWeekIndex < WEEKS.length - 1) {
        currentWeekIndex += 1;
        render();
      }
    });

    document.getElementById("printBtn").addEventListener("click", () => {
      window.print();
    });

    initWeekIndex();
    loadData();
    setInterval(loadData, 20000);
  </script>
</body>
</html>
